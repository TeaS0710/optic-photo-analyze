name: Publish Site

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate remote backend configuration
        run: |
          if [ -z "${OLLAMA_API_HOST}" ]; then
            echo "Missing OLLAMA_API_HOST secret. Configure an Ollama-compatible remote endpoint to build and publish from GitHub Actions."
            exit 1
          fi
        env:
          OLLAMA_API_HOST: ${{ secrets.OLLAMA_API_HOST }}

      - name: Build analysis, site and publishable bundle
        run: make full MODEL="qwen3-vl:235b-cloud" LLM_POSTPROCESS=1
        env:
          OLLAMA_API_HOST: ${{ secrets.OLLAMA_API_HOST }}
          OLLAMA_API_TOKEN: ${{ secrets.OLLAMA_API_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
